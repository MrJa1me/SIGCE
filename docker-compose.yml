services:
  postgres:
    image: postgres:16-alpine
    container_name: sigce-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sigce
      POSTGRES_USER: sigce
      POSTGRES_PASSWORD: sigce2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigce -d sigce"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build: ./services/auth
    container_name: sigce-auth
    restart: unless-stopped
    ports:
      - "4001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sigce
      DB_USER: sigce
      DB_PASSWORD: sigce2026
      JWT_SECRET: sigce-dev-secret-2026
    depends_on:
      postgres:
        condition: service_healthy

  checkins:
    build: ./services/checkins
    container_name: sigce-checkins
    restart: unless-stopped
    ports:
      - "4002:3002"
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sigce
      DB_USER: sigce
      DB_PASSWORD: sigce2026
    depends_on:
      postgres:
        condition: service_healthy

  users:
    build: ./services/users
    container_name: sigce-users
    restart: unless-stopped
    ports:
      - "4003:3003"
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sigce
      DB_USER: sigce
      DB_PASSWORD: sigce2026
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./services/gateway
    container_name: sigce-gateway
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      PORT: 3000
      AUTH_URL: http://auth:3001
      CHECKINS_URL: http://checkins:3002
      USERS_URL: http://users:3003
    depends_on:
      - auth
      - checkins
      - users

  frontend:
    image: nginx:alpine
    container_name: sigce-frontend
    restart: unless-stopped
    ports:
      - "4173:80"
    volumes:
      - ./sigce-app/dist:/usr/share/nginx/html
      - ./sigce-app/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway

volumes:
  pgdata:
